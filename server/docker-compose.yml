services:
  server:
    build: .
    environment:
      SMARTTRIAGE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/smarttriage
      SMARTTRIAGE_REDIS_HOST: redis
      SMARTTRIAGE_REDIS_PORT: 6379
    ports: ["7016:7016"]
    depends_on: [postgres, redis]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smarttriage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: [pg_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    volumes: [redis_data:/data]
    ports: ["6379:6379"]

volumes:
  pg_data:
  redis_data:
