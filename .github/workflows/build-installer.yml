name: Build Installer

on:
  push:
    tags:
      - 'v*'          # 推送 v3.0.0 这样的标签时触发
    branches:
      - main
      - master        # 兼容两种分支名
  workflow_dispatch:  # 也可以在 GitHub 页面手动触发

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build
          dir /s /b dist\
        shell: cmd

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install Python dependencies
        run: |
          cd server
          pip install -r requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Build SmartTriage.exe (PyInstaller)
        run: |
          chcp 65001 >nul
          set PYTHONIOENCODING=utf-8
          cd server
          pyinstaller --clean build.spec
        shell: cmd

      - name: Download PostgreSQL portable
        run: |
          New-Item -ItemType Directory -Force -Path installer\pgsql | Out-Null
          $url = 'https://get.enterprisedb.com/postgresql/postgresql-10.23-1-windows-x64-binaries.zip'
          Write-Host 'Downloading PostgreSQL...'
          curl.exe -L -o pg.zip --max-redirs 5 $url
          if ($LASTEXITCODE -ne 0) {
              Write-Host 'Primary download failed, trying mirror...'
              $url = 'https://github.com/OneBigMoon/smarttriage/releases/download/deps/postgresql-10.23-1-windows-x64-binaries.zip'
              Invoke-WebRequest -Uri $url -OutFile 'pg.zip' -UseBasicParsing
          }
          Write-Host 'Extracting...'
          Expand-Archive -Path 'pg.zip' -DestinationPath 'pg-tmp' -Force
          Copy-Item -Path 'pg-tmp\pgsql\*' -Destination 'installer\pgsql\' -Recurse -Force
          Remove-Item -Recurse -Force 'pg-tmp'
          Remove-Item 'pg.zip'
          Write-Host "PostgreSQL ready:"
          Get-ChildItem installer\pgsql\bin\*.exe | Select-Object Name
        shell: powershell

      - name: Download Redis portable
        run: |
          New-Item -ItemType Directory -Force -Path installer\redis | Out-Null
          Write-Host 'Downloading Redis...'
          $url = 'https://github.com/microsoftarchive/redis/releases/download/win-3.2.100/Redis-x64-3.2.100.zip'
          Invoke-WebRequest -Uri $url -OutFile 'redis.zip' -UseBasicParsing
          Expand-Archive -Path 'redis.zip' -DestinationPath 'redis-tmp' -Force
          Copy-Item -Path 'redis-tmp\redis-server.exe' -Destination 'installer\redis\'
          Copy-Item -Path 'redis-tmp\redis-cli.exe' -Destination 'installer\redis\'
          Remove-Item -Recurse -Force 'redis-tmp'
          Remove-Item 'redis.zip'
          # Generate redis.conf
          @"
          port 6379
          bind 127.0.0.1
          daemonize no
          logfile ""
          databases 16
          save ""
          "@ | Out-File -Encoding ASCII installer\redis\redis.conf
          Write-Host "Redis ready"
        shell: powershell

      - name: Download nssm
        run: |
          Write-Host 'Downloading nssm...'
          # nssm.cc 可能限制直接下载，改用 GitHub 镜像
          $url = 'https://raw.githubusercontent.com/nssm/nssm/refs/heads/master/README.txt'
          $zipUrl = 'https://nssm.cc/release/nssm-2.24-101-g897c7ad.zip'
          # 先用 curl.exe（Windows CI 内置）
          curl.exe -L -o nssm.zip --max-redirs 5 $zipUrl
          if ($LASTEXITCODE -ne 0) {
              # 备用：从 GitHub releases 下载（社区镜像）
              Write-Host 'Primary download failed, trying mirror...'
              $fallbackUrl = 'https://github.com/nicedoc/nssm/releases/download/v2.24-101-g897c7ad/nssm-2.24-101-g897c7ad.zip'
              Invoke-WebRequest -Uri $fallbackUrl -OutFile 'nssm.zip' -UseBasicParsing
          }
          Expand-Archive -Path 'nssm.zip' -DestinationPath 'nssm-tmp' -Force
          $nssmExe = Get-ChildItem -Path 'nssm-tmp' -Recurse -Filter 'nssm.exe' | Select-Object -First 1
          if ($nssmExe) {
              Copy-Item -Path $nssmExe.FullName -Destination 'installer\nssm.exe'
              Write-Host "nssm ready"
          } else {
              Write-Host "WARNING: nssm.exe not found, service mode will fallback to sc.exe"
          }
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue 'nssm-tmp'
          Remove-Item -Force -ErrorAction SilentlyContinue 'nssm.zip'
        shell: powershell

      - name: Copy SmartTriage.exe to installer dir
        run: |
          cd server
          copy /Y dist\SmartTriage.exe installer\SmartTriage.exe
        shell: cmd

      - name: Setup Inno Setup
        run: |
          choco install innosetup --no-progress -y
        shell: cmd

      - name: Compile installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
        shell: cmd
        working-directory: server

      - name: List output
        run: dir /s installer\Output\
        shell: cmd
        working-directory: server

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTriage-Setup
          path: server/installer/Output/SmartTriage-Setup-*.exe
          compression-level: 0   # 已经是压缩的 exe，不再压缩
          retention-days: 30