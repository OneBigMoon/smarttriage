name: Build Installer

on:
  push:
    tags:
      - 'v*'          # 推送 v3.0.0 这样的标签时触发
    branches:
      - main
      - master        # 兼容两种分支名
  workflow_dispatch:  # 也可以在 GitHub 页面手动触发

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build
          dir /s /b dist\
        shell: cmd

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install Python dependencies
        run: |
          cd server
          pip install -r requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Build SmartTriage.exe (PyInstaller)
        run: |
          chcp 65001 >nul
          set PYTHONIOENCODING=utf-8
          cd server
          pyinstaller --clean build.spec
        shell: cmd

      - name: Download PostgreSQL portable
        run: |
          New-Item -ItemType Directory -Force -Path installer\pgsql | Out-Null
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          Write-Host 'Downloading PostgreSQL 10.23 (80MB)...'
          curl.exe -sL -o pg.zip --url "https://get.enterprisedb.com/postgresql/postgresql-10.23-1-windows-x64-binaries.zip" --retry 3 --connect-timeout 30
          if %errorlevel% neq 0 (
              echo PostgreSQL download from EDB failed. Trying GitHub mirror...
              curl.exe -sL -o pg.zip --url "https://github.com/OneBigMoon/smarttriage/releases/download/deps/postgresql-10.23-1-windows-x64-binaries.zip" --retry 3
          )
          if %errorlevel% neq 0 (
              echo PostgreSQL download failed - installer will skip portable PG.
              exit /b 0
          )
          echo Extracting...
          powershell -Command "Expand-Archive -Path pg.zip -DestinationPath pg-tmp -Force"
          xcopy /E /Y /Q pg-tmp\pgsql installer\pgsql\ > nul
          rmdir /s /q pg-tmp
          del pg.zip
          echo PostgreSQL ready
        shell: cmd

      - name: Download Redis portable
        run: |
          New-Item -ItemType Directory -Force installer\redis > nul 2>&1
          echo Downloading Redis...
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          $url = 'https://github.com/microsoftarchive/redis/releases/download/win-3.2.100/Redis-x64-3.2.100.zip'
          try { Invoke-WebRequest $url -OutFile redis.zip -UseBasicParsing -ErrorAction Stop }
          catch { Write-Host 'Redis download failed.'; exit 0 }
          Expand-Archive -Path redis.zip -DestinationPath redis-tmp -Force
          Copy-Item redis-tmp\redis-server.exe installer\redis\
          Copy-Item redis-tmp\redis-cli.exe installer\redis\
          rmdir /s /q redis-tmp
          del redis.zip
          echo port 6379 > installer\redis\redis.conf
          echo bind 127.0.0.1 >> installer\redis\redis.conf
          echo daemonize no >> installer\redis\redis.conf
          echo databases 16 >> installer\redis\redis.conf
          echo save "" >> installer\redis\redis.conf
          echo Redis ready
        shell: powershell

      - name: Download nssm (optional)
        run: |
          echo Downloading nssm...
          curl.exe -sL -o nssm.zip --url "https://nssm.cc/release/nssm-2.24-101-g897c7ad.zip" --retry 3 --connect-timeout 15
          if %errorlevel% neq 0 ( echo nssm download failed, will use sc.exe. & exit /b 0 )
          powershell -Command "Expand-Archive -Path nssm.zip -DestinationPath nssm-tmp -Force"
          for /r nssm-tmp %%i in (nssm.exe) do copy /Y %%i installer\nssm.exe > nul
          rmdir /s /q nssm-tmp
          del nssm.zip
          if exist installer\nssm.exe ( echo nssm ready ) else ( echo nssm not found )
        shell: cmd

      - name: Copy SmartTriage.exe to installer dir
        run: |
          copy /Y server\dist\SmartTriage.exe server\installer\SmartTriage.exe
        shell: cmd

      - name: Setup Inno Setup
        run: |
          choco install innosetup --no-progress -y
        shell: cmd

      - name: Compile installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" server\installer\setup.iss
        shell: cmd

      - name: List output
        run: dir /s server\installer\Output\
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTriage-Setup
          path: server/installer/Output/SmartTriage-Setup-*.exe
          compression-level: 0
          retention-days: 30