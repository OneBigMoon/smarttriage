name: Build Installer

on:
  push:
    tags:
      - 'v*'          # 推送 v3.0.0 这样的标签时触发
    branches:
      - main
      - master        # 兼容两种分支名
  workflow_dispatch:  # 也可以在 GitHub 页面手动触发

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build
          dir /s /b dist\
        shell: cmd

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install Python dependencies
        run: |
          cd server
          pip install -r requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Build SmartTriage.exe (PyInstaller)
        run: |
          chcp 65001 >nul
          set PYTHONIOENCODING=utf-8
          cd server
          pyinstaller --clean build.spec
        shell: cmd

      - name: Download PostgreSQL portable
        run: |
          New-Item -ItemType Directory -Force -Path installer\pgsql | Out-Null
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          Write-Host 'Downloading PostgreSQL 10.23 (80MB)...'
          try {
              Invoke-WebRequest -Uri 'https://get.enterprisedb.com/postgresql/postgresql-10.23-1-windows-x64-binaries.zip' -OutFile pg.zip -UseBasicParsing
          } catch {
              Write-Host 'PostgreSQL download failed, build will continue without it.'
              Write-Host "Error: $($_.Exception.GetType().Name)"
              exit 0
          }
          Expand-Archive -Path pg.zip -DestinationPath pg-tmp -Force
          Copy-Item -Path pg-tmp\pgsql\* -Destination installer\pgsql\ -Recurse -Force
          Remove-Item -Recurse -Force pg-tmp
          Remove-Item pg.zip
          Write-Host "PostgreSQL ready"
        shell: powershell

      - name: Download Redis portable
        run: |
          New-Item -ItemType Directory -Force -Path installer\redis | Out-Null
          Write-Host 'Downloading Redis...'
          try {
              Invoke-WebRequest -Uri 'https://github.com/microsoftarchive/redis/releases/download/win-3.2.100/Redis-x64-3.2.100.zip' -OutFile redis.zip -UseBasicParsing
          } catch {
              Write-Host 'Redis download failed, build will continue without it.'
              exit 0
          }
          Expand-Archive -Path redis.zip -DestinationPath redis-tmp -Force
          Copy-Item -Path redis-tmp\redis-server.exe -Destination installer\redis\
          Copy-Item -Path redis-tmp\redis-cli.exe -Destination installer\redis\
          Remove-Item -Recurse -Force redis-tmp
          Remove-Item redis.zip
          # redis.conf
          echo port 6379 > installer\redis\redis.conf
          echo bind 127.0.0.1 >> installer\redis\redis.conf
          echo daemonize no >> installer\redis\redis.conf
          echo databases 16 >> installer\redis\redis.conf
          echo save "" >> installer\redis\redis.conf
          Write-Host 'Redis ready'
        shell: powershell

      - name: Download nssm (optional)
        run: |
          Write-Host 'Downloading nssm...'
          try {
              Invoke-WebRequest -Uri 'https://nssm.cc/release/nssm-2.24-101-g897c7ad.zip' -OutFile nssm.zip -UseBasicParsing
          } catch {
              Write-Host 'nssm download failed, installer will use sc.exe instead.'
              exit 0
          }
          Expand-Archive -Path nssm.zip -DestinationPath nssm-tmp -Force
          $nssmExe = Get-ChildItem -Path nssm-tmp -Recurse -Filter nssm.exe | Select-Object -First 1
          if ($nssmExe) {
              Copy-Item $nssmExe.FullName installer\nssm.exe
              Write-Host 'nssm ready'
          }
          Remove-Item -Recurse -Force nssm-tmp
          Remove-Item nssm.zip
        shell: powershell

      - name: Copy SmartTriage.exe to installer dir
        run: |
          copy /Y server\dist\SmartTriage.exe server\installer\SmartTriage.exe
        shell: cmd

      - name: Setup Inno Setup
        run: |
          choco install innosetup --no-progress -y
        shell: cmd

      - name: Compile installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" server\installer\setup.iss
        shell: cmd

      - name: List output
        run: dir /s server\installer\Output\
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTriage-Setup
          path: server/installer/Output/SmartTriage-Setup-*.exe
          compression-level: 0
          retention-days: 30