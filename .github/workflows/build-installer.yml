name: Build Installer

on:
  push:
    tags:
      - 'v*'          # 推送 v3.0.0 这样的标签时触发
    branches:
      - main          # 推送到 main 也触发（方便测试）
  workflow_dispatch:  # 也可以在 GitHub 页面手动触发

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm install --silent
          npm run build
        shell: cmd

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install Python dependencies
        run: |
          cd server
          pip install -r requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Build SmartTriage.exe (PyInstaller)
        run: |
          cd server
          pyinstaller build.spec
        shell: cmd

      - name: Download PostgreSQL portable
        run: |
          mkdir installer\pgsql
          cd installer
          powershell -Command "& {
              $url = 'https://get.enterprisedb.com/postgresql/postgresql-10.23-1-windows-x64-binaries.zip'
              Write-Host 'Downloading PostgreSQL...'
              Invoke-WebRequest -Uri $url -OutFile 'pg.zip' -UseBasicParsing
              Write-Host 'Extracting...'
              Expand-Archive -Path 'pg.zip' -DestinationPath 'pg-tmp' -Force
              xcopy /E /Y /Q 'pg-tmp\pgsql' 'pgsql\' > nul
              Remove-Item -Recurse -Force 'pg-tmp'
              Remove-Item 'pg.zip'
          }"
          echo "PostgreSQL portable ready:"
          dir /b pgsql\bin\*.exe
        shell: cmd
        working-directory: server

      - name: Download Redis portable
        run: |
          mkdir installer\redis
          cd installer
          powershell -Command "& {
              $url = 'https://github.com/microsoftarchive/redis/releases/download/win-3.2.100/Redis-x64-3.2.100.zip'
              Invoke-WebRequest -Uri $url -OutFile 'redis.zip' -UseBasicParsing
              Expand-Archive -Path 'redis.zip' -DestinationPath 'redis-tmp' -Force
              copy /Y 'redis-tmp\redis-server.exe' 'redis\'
              copy /Y 'redis-tmp\redis-cli.exe' 'redis\'
              Remove-Item -Recurse -Force 'redis-tmp'
              Remove-Item 'redis.zip'
          }"
          :: Generate redis.conf
          echo port 6379> installer\redis\redis.conf
          echo bind 127.0.0.1>> installer\redis\redis.conf
          echo daemonize no>> installer\redis\redis.conf
          echo logfile "" >> installer\redis\redis.conf
          echo databases 16>> installer\redis\redis.conf
          echo save "" >> installer\redis\redis.conf
          echo Redis ready
        shell: cmd
        working-directory: server

      - name: Download nssm
        run: |
          cd installer
          powershell -Command "& {
              $url = 'https://nssm.cc/release/nssm-2.24-101-g897c7ad.zip'
              Invoke-WebRequest -Uri $url -OutFile 'nssm.zip' -UseBasicParsing
              Expand-Archive -Path 'nssm.zip' -DestinationPath 'nssm-tmp' -Force
              copy /Y 'nssm-tmp\nssm-2.24-101-g897c7ad\win64\nssm.exe' 'nssm.exe'
              Remove-Item -Recurse -Force 'nssm-tmp'
              Remove-Item 'nssm.zip'
          }"
          echo nssm ready
        shell: cmd
        working-directory: server

      - name: Copy SmartTriage.exe to installer dir
        run: copy /Y dist\SmartTriage.exe installer\SmartTriage.exe
        shell: cmd
        working-directory: server

      - name: Setup Inno Setup
        run: |
          choco install innosetup --no-progress -y
        shell: cmd

      - name: Compile installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
        shell: cmd
        working-directory: server

      - name: List output
        run: dir /s installer\Output\
        shell: cmd
        working-directory: server

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTriage-Setup
          path: server/installer/Output/SmartTriage-Setup-*.exe
          compression-level: 0   # 已经是压缩的 exe，不再压缩
          retention-days: 30